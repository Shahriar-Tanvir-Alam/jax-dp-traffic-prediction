method: grid
name: multi-6-dp-optimal-g1-m2-3-RDP-dp1-without-epsilon
metric:
  name: best_val_loss
  goal: minimize
parameters:
  dataset:
    value: "speed_inflow_outflow"
  data_name_path: 
    value: "realtime=../data/realtime_nyc/*tlc_nyc_inflow=../data/tlc_nyc/fhvhv/*tlc_nyc_outflow=../data/tlc_nyc/fhvhv/"
  company:
    value: "" # <<<<
  ensemble:
    value: 0 
  learning_rate:
    value: 0.001 # <<<<
  hidden: 
    value: 0
  val_step: 
    value: 2
  epochs: 
    value: 38 # <<<<
  optimizer: 
    value: "adam"
  train_ratio: 
    value: 0.6
  val_ratio: 
    value: 0.2
  n_input_periods: 
    value: 6
  n_output_periods: 
    value: 6
  batch_size: 
    value: 256 # <<<<
  out_channels: 
    value: 32
  normalize: 
    value: true
  device: 
    value: "gpu"
  shuffle: 
    value:  1
  model_name: 
    value: "multiprediction_6"
  dp_loaded:
    value: ""
  loss_function: 
    value: "mse"
  patience:
    value: 500
  year:
    value: 2019
  start_month:
    value: 2
  end_month:
    value: 3
  boroughs:
    value: 'Q'
  bucket_size:
    value: '10min'
  graph_version:
    value: 1
  dp:
    value: 1  # <<<< # 0: Non-private, 1: Private using Opacus (make_private), 2: Private using Opacus (make_private_with_epsilon)
  sigma:
    value: 1 # "Noise multiplier"
  max_per_sample_grad_norm:
    value: 0.1  # <<<< # [0.1, 0.2, 0.4, 0.8, 1.6, 3.2, 6.4, 10] # "Clip per-sample gradients to this norm", Tuning MAX_GRAD_NORM is very important. Start with a low noise multiplier like .1, this should give comparable performance to a non-private model. Then do a grid search for the optimal MAX_GRAD_NORM.
  delta:
    value: 0.00001 # "Target delta". If # of samples<10000, we can use delat=10^-5
  epsilon:
    value: 10  # <<<< # [10, 20] # [1, 10, 20, 1000] # "Target epsilon"
  secure_rng:
    value: 0 # 1: True, 0: False
  accountant:
    value: 'rdp' # Accounting mechanism. Currently supported: - rdp (RDPAccountant) - gdp (GaussianAccountant) - prv (:class`~opacus.accountants.PRVAccountant`), default in Opacus is 'prv'

