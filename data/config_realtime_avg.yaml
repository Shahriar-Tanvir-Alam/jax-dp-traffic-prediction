method: grid
name: avg-realtime-m2-3
metric:
  name: test_loss_unnormalized
  goal: minimize
parameters:
  dataset: 
    value: "realtime"
  company:
    value: "lyft" # If realtime data is public, company should be "", i.e., no company specified.
  data_name_path: 
    value: "realtime=../data/realtime_nyc/*tlc_nyc_inflow=../data/tlc_nyc/fhvhv/*tlc_nyc_outflow=../data/tlc_nyc/fhvhv/"
  learning_rate:
    value: 0.001 # [0.01, 0.001, 0.0001, 0.00001, 0.000001]
  hidden:  
    value: 0
  val_step: 
    value: 1
  epochs: 
    value: 1
  optimizer: 
    value:  "adam"
  train_ratio: 
    value:  0.6
  val_ratio: 
    value:  0.2
  n_input_periods: 
    value:  6
  n_output_periods: 
    value:  6
  batch_size: 
    value: 1024
  out_channels: 
    value:  32
  normalize: 
    value: 1
  device: 
    value: "gpu"
  shuffle: 
    value: 1 
  model_name: 
    value: "avg_s" # 1. astgcn, 2. a3tgcn, 3. astgcn_customized 4. mstgcn, 5. avg
  dp_loaded:
    value: ""
  loss_function: 
    value: "mse"
  ensemble:
    value: 0
  patience:
    value: 500
  year:
    value: 2019
  start_month:
    value: 2
  end_month:
    value: 3
  boroughs:
    value: 'Q'
  bucket_size:
    value: '10min'
  graph_version:
    value: 1
  dp:
    value: 0
  sigma:
    value: 1 # "Noise multiplier"
  max_per_sample_grad_norm:
    value: 1 # "Clip per-sample gradients to this norm"
  delta:
    value: 0.00001 # "Target delta"
  secure_rng:
    value: 0 
  accountant:
    value: 'rdp' # Accounting mechanism. Currently supported: - rdp (RDPAccountant) - gdp (GaussianAccountant) - prv (:class`~opacus.accountants.PRVAccountant`), default in Opacus is 'prv'
  nb_block:
    value: 2 # [1,2,3] 
  K:
    value: 3 # [2,3,4]
  nb_chev_filter:
    value: 64 # [32, 64, 128]
  nb_time_filter:
    value: 64 # [32, 64, 128]
  time_strides:
    value: 1
